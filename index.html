<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enes Duruk Apps</title>
  <meta name="description" content="Developer page for mobile games and apps by Enes Duruk." />
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --text: #1f2933;
      --muted: #657080;
      --line: #d9dee7;
      --accent: #2f7d57;
      --accent-dark: #245f43;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    main {
      width: min(880px, calc(100% - 32px));
      margin: 0 auto;
      padding: 56px 0;
    }

    header {
      margin-bottom: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      line-height: 1.15;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 24px;
      margin-top: 16px;
    }

    h2 {
      margin: 0 0 14px;
      font-size: 20px;
    }

    .app {
      display: grid;
      grid-template-columns: 64px 1fr;
      gap: 16px;
      align-items: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 14px;
      background: #fff3dc;
      border: 1px solid #eadcc4;
      display: grid;
      place-items: center;
      font-weight: 700;
      color: #b35b16;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 16px;
    }

    a {
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    a:hover {
      color: var(--accent-dark);
      text-decoration: underline;
    }

    .button {
      display: inline-flex;
      align-items: center;
      min-height: 40px;
      padding: 8px 12px;
      border-radius: 6px;
      border: 1px solid var(--line);
      background: #f9fafb;
    }

    footer {
      margin-top: 22px;
      color: var(--muted);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Enes Duruk Apps</h1>
      <p>Developer page for mobile games and apps published by Enes Duruk.</p>
    </header>

    <section aria-labelledby="apps-title">
      <h2 id="apps-title">Published Apps</h2>
      <div class="app">
        <div class="icon" aria-hidden="true">BM</div>
        <div>
          <strong>Brick Multiplier</strong>
          <p>Casual arcade puzzle game for Android.</p>
          <div class="links">
            <a class="button" href="https://play.google.com/store/apps/details?id=com.enesduruk.brickmultiplier">Google Play</a>
            <a class="button" href="https://enesduruk.github.io/brick-multiplier-privacy/">Privacy Policy</a>
          </div>
        </div>
      </div>
    </section>

    <section aria-labelledby="support-title">
      <h2 id="support-title">Support</h2>
      <p>For questions about these apps, contact <a href="mailto:enesduruk.tr@gmail.com">enesduruk.tr@gmail.com</a>.</p>
    </section>

    <footer>
      <span>Authorized sellers file: </span><a href="/app-ads.txt">app-ads.txt</a>
    </footer>
  </main>
</body>
</html>
